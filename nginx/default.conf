upstream zoom_controller {
    server zoom-controller:7000;
}

upstream selenium_hub {
    server selenium-hub:4444;
}

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://zoom_controller/api/;
        proxy_set_header Host $host;
    }

    location /wd/hub/ {
        proxy_pass http://selenium_hub/wd/hub/;
        proxy_set_header Host $host;
    }

    location / {
        return 200 'Zoom automation edge running';
        add_header Content-Type text/plain;
    }
}
